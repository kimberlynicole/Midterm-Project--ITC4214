<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title> Majestic Villa</title>
        <link href="CSS/navbar.css" rel="stylesheet">
        <link href="CSS/book.css" rel="stylesheet">
        <link href="CSS/banner.css" rel="stylesheet">
        <link href="CSS/style.css" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <script src="javascript/darkmode.js" defer></script>
         <script src="javascript/weather.js" defer></script>
        <script src="javascript/book.js" defer></script>
         <script src="javascript/footer.js" defer></script>
    </head>

    <body>

       <!--------------------------------------------- NAVIGATION BAR---------------------------------------------------->
        <nav class="nav-bar navbar navbar-expand-lg sticky-top navbar-light "
            role="navigation"
            aria-label="Main Navigation">

            <div class="container">

                <!-- Logo + title -->
                <div class="d-flex align-items-center">
                    <img src="images/logo.png" alt="Majestic Villa Logo" width="60" height="60"> 
                    <h4 class="ms-3">Majestic Villa</h4>
                </div>

                <!-- Hamburger button -->
                <button class=" navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#menu"
                    aria-controls="menu"
                    aria-expanded="false"
                    aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <!-- Nav Links -->
                <div class="nav-links collapse navbar-collapse justify-content-end" id="menu">
                    <ul class="navbar-nav align-items-lg-center">
                    
                        <li class="nav-item">
                            <a class="nav-link" href="index.html">Home</a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" href="trip-planner.html">Trip Planner</a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" href="about.html">About</a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" href="contact.html">Contact</a>
                        </li>

                        <!-- Book button -->
                        <li class="nav-item">
                            <a class="nav-link active" href="book.html">Book Now</a>
                        </li>

                        <!-- Dark mode toggle -->
                        <li class="nav-item">
                            <button class="dark-toggle"
                                onclick="toggleDarkMode()"
                                aria-label="Toggle dark mode">
                            </button>
                        </li>

                    </ul>
                </div>

            </div>
        </nav>
        
        
         <!-- ================= HERO / BANNER ================= -->
        <div>
            <div class="banner img-fluid" role="banner" aria-label="Conatct page hero section">
                <img src="images/patio.png" alt="Patio of the Majestic Villa with ocean view">
                <div class="overlay"></div> <!-- semi-transparent layer -->
                <div class="banner-text">
                    <h1 class="mb-4">Book Your Stay at Majestic Villa </h1> 
                     <p class="text-center">Luxury • Comfort • Elegance</p>
            </div>
                    
            </div>
        </div>
        <!-- BOOKING -->
        <section class="container py-5">
            <div class="row g-4">

                <!-- FORM COLUMN -->
                <div class="col-lg-8 card p-4 mb-4">
                    <h3 class="mb-4">Booking Details</h3>
                    <form id="bookingForm">
                        <div class="row g-3">

                            <div class="col-md-6">
                                <label class="form-label">Full Name</label>
                                <input type="text"
                                    maxlength="50"
                                    class="form-control"
                                    id="fullName"
                                    required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Email</label>
                                <input type="email"
                                    maxlength="50"
                                    class="form-control"
                                    id="email"
                                    required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Check-in</label>
                                <input type="date"
                                    id="checkin"
                                    class="form-control"
                                    required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Check-out</label>
                                <input type="date"
                                    id="checkout"
                                    class="form-control"
                                    required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Guests (Max 10)</label>
                                <input type="number"
                                    min="1"
                                    max="10"
                                    value="1"
                                    class="form-control"
                                    id="guests"
                                    required>
                            </div>

                            <div class="col-12">
                                <button id="button-book" class="btn w-100" type="submit">
                                    Confirm Booking
                                </button>
                            </div>

                        </div>
                    </form>

                    <div id="errorMessage"
                        class="alert alert-danger mt-3 d-none">
                    </div>

                    <div id="successMessage"
                        class="alert alert-success mt-3 d-none">
                        Booking submitted successfully!
                    </div>
                </div>

                
                <!-- PRICE SUMMARY + WEATHER COLUMN -->
                <div class="col-lg-4 d-flex flex-column">

                <!-- Price Summary (New Component)-->
                    <div class="price-box mb-3">
                        <h4>$350 / Night</h4>
                        <p>Total Nights: <span id="totalNights">0</span></p>
                        <hr>
                        <h5>Total: $<span id="totalPrice">0</span></h5>
                    </div>

                    <!-- Spacer to push weather card to the bottom -->
                    <div class="flex mt-3"></div>

                    <!-- Weather Card -->
                    <div class="weather-box mt-3">
                        <h5 class="mb-3 text-center">Current Weather</h5>
                        <div id="weatherResult" class="fs-6 text-center"></div>
                    </div>

                </div>
                
            </div>
   
        </section>

        <div id="footer-placeholder"></div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    </body>

</html>

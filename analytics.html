<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Trip Analytics</title>

        <link href="CSS/analytics.css" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <script src="javascript/analytics.js" defer></script>
    </head>

    <body>

        <!-- Main Page Heading -->
        <h2 class="my-4 text-center">Trip Task Analytics</h2>

       <div class="box shadow-lg" role="region" aria-labelledby="analytics-heading">
            <!-- Bar Chart -->
            <div class="bar-container" role="img" aria-label="Bar chart showing completed and pending trip tasks" >
                <!-- Completed Tasks Bar -->
                <div class="bar completed-bar" role="progressbar" aria-label="Completed tasks"></div>
               
                <!-- Pending Tasks Bar -->
                <div class="bar pending-bar" role="progressbar" aria-label="Pending tasks"></div>
            </div>

             
            <div class="legend">
                <span class="color-box" style="background:green;"></span> Completed
                &nbsp;&nbsp;
                <span class="color-box" style="background:red;"></span> Pending
            </div>

            <div class="mt-4">
                <p>Completed: <span class="completed"></span></p>
                <p>Pending: <span class="pending"></span></p>
                <p>Total: <span class="total"></span></p>
            </div>

        </div>

            <a href="trip-planner.html" class="btn mt-4" id="back-button">
                Back to Trip Planner </a>
       

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    </body>
</html>

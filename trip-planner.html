<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Majestic Villa</title>

        <link href="CSS/navbar.css" rel="stylesheet">
        <link href="CSS/banner.css" rel="stylesheet">
        <link href="CSS/trip.css" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <script src="javascript/darkmode.js" defer></script>
        <script src="javascript/trip.js" defer></script>
        <script src="javascript/footer.js" defer></script>
        
    </head>

    <body>
        <!--------------------------------------------- NAVIGATION BAR---------------------------------------------------->
        <nav class="nav-bar navbar navbar-expand-lg sticky-top navbar-light "
            role="navigation"
            aria-label="Main Navigation">

            <div class="container">

                <!-- Logo + title -->
                <div class="d-flex align-items-center">
                    <img src="images/logo.png" alt="Majestic Villa Logo" width="60" height="60"> 
                    <h4 class="ms-3">Majestic Villa</h4>
                </div>

                <!-- Hamburger button -->
                <button class=" navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#menu"
                    aria-controls="menu"
                    aria-expanded="false"
                    aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <!-- Nav Links -->
                <div class="nav-links collapse navbar-collapse justify-content-end" id="menu">
                    <ul class="navbar-nav align-items-lg-center">
                    
                        <li class="nav-item">
                            <a class="nav-link" href="index.html">Home</a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link active" href="trip-planner.html">Trip Planner</a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" href="about.html">About</a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" href="contact.html">Contact</a>
                        </li>

                        <!-- Book button -->
                        <li class="nav-item">
                            <a class="nav-link" href="book.html">Book Now</a>
                        </li>

                        <!-- Dark mode toggle -->
                        <li class="nav-item">
                            <button class="dark-toggle"
                                onclick="toggleDarkMode()"
                                aria-label="Toggle dark mode">
                            </button>
                        </li>

                    </ul>
                </div>

            </div>
        </nav>


        <!-- ================= HERO / BANNER ================= -->
        <div>
            <div class="banner img-fluid" role="banner" aria-label="Conatct page hero section">
                <img src="images/outdoor-pool.png" alt="Private beach of majestic villa">
                <div class="overlay"></div> <!-- semi-transparent layer -->
                <div class="banner-text">
                    <div class="text-center mb-4">
                        <h1>Trip Planner Itinerary</h1>
                        <a href="analytics.html" class="  btn btn-warning btn-lg mt-2" id="button-analytics">View Analytics</a>
                    </div>
                    
                </div>
        </div>
        

        <div class="container my-5">
            <!-- ADD FORM -->
            <div class="card p-3 mb-4">
                <div class="row g-2">

                    <div class="col-md-2">
                        <select id="daySelect" class="form-select">
                            <option value="Day 1">Day 1</option>
                            <option value="Day 2">Day 2</option>
                            <option value="Day 3">Day 3</option>
                            <option value="Day 4">Day 4</option>
                            <option value="Day 5">Day 5</option>
                            <option value="Day 6">Day 6</option>
                            <option value="Day 7">Day 7</option>
                        </select>
                    </div>

                    <div class="col-md-2">
                        <input type="date" id="tripDate" class="form-control" required>
                    </div>

                    <div class="col-md-2">
                        <input type="text" id="activityName" class="form-control"
                            placeholder="Activity" maxlength="50" required>
                    </div>

                    <div class="col-md-2">
                        <input type="text" id="location" class="form-control"
                            placeholder="Location" maxlength="50" required>
                    </div>

                    <div class="col-md-2">
                        <input type="text" id="description" class="form-control"
                            placeholder="description" maxlength="80" required>
                    </div>

                    <div class="col-md-2">
                        <button id="addBtn" class="btn w-100">Add</button>
                    </div>

                    <div id="errorMsg" style="color:red; font-weight:bold;"></div>

                </div>
            </div>


            <div id="tripPreview">
                <!-- SUMMARY -->
                <div class="mb-3">
                    <b>Total:</b> <span id="total"></span> |
                    <b>Pending:</b> <span id="pending"></span> |
                    <b>Completed:</b> <span id="completed"></span>
                </div>

                <!-- FILTER -->
                <div class="mb-3 col-md-3">
                    <select id="statusFilter" class="form-select">
                        <option value="all">All</option>
                        <option value="pending">Pending</option>
                        <option value="completed">Completed</option>
                    </select>
                </div>

                <!-- DAY CONTAINER -->
                <div id="daysContainer" class="row g-4"></div>

            </div>

            
        </div>

        <div id="footer-placeholder"></div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    </body>
</html>
